<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メダル交換計算ツール</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>メダル交換計算ツール</h1>

      <label for="medals">持ちメダル</label>
      <input id="medals" type="number" min="0" placeholder="例: 250">

      <label for="rate">1000円あたりの貸出枚数</label>
      <input id="rate" type="number" min="1" step="0.1" value="46">

      <label for="unit">景品交換の最小単位（円）</label>
      <input id="unit" type="number" min="1" step="1" value="500">

      <div class="result">
        <p>総額換算：<span id="totalYen">-</span></p>
        <p>交換可能景品額：<span id="prizeAmount">-</span></p>
        <p>余りメダル：<span id="remainingMedals">-</span></p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
